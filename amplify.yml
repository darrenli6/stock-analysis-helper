version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install pnpm
        - npm install -g pnpm@10.12.4
        # Install dependencies
        - pnpm install --shamefully-hoist

    build:
      commands:
        - env | grep -e DATABASE_URL -e OPENAI_API_KEY -e AUTH_SECRET -e NODE_ENV >> .env || true
        - pnpm run build
        # Standalone output needs static assets copied in manually
        - cp -r public .next/standalone/public
        - cp -r .next/static .next/standalone/.next/static
  artifacts:
    # next.config.js sets output:"standalone" — deploy the self-contained bundle
    baseDirectory: .next/standalone
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
