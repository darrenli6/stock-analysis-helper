version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install pnpm
        - npm install -g pnpm@10.12.4
        # Install dependencies
        - pnpm install --shamefully-hoist

    build:
      commands:
        - env | grep -e DATABASE_URL -e OPENAI_API_KEY -e AUTH_SECRET -e NODE_ENV >> .env || true
        - pnpm run build
        # Copy westock into .next/_vendor/ — avoids Amplify's automatic node_modules exclusion
        # westock-data-clawhub has zero external dependencies so this single folder is sufficient
        - mkdir -p .next/_vendor/westock-data-clawhub
        - cp -r node_modules/westock-data-clawhub/. .next/_vendor/westock-data-clawhub/
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
